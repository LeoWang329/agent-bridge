<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Loop 交付 · 观察台</title>
<style>
/* ============================================================
   Agent Loop · 只读实时观察台(爬坡视图)
   零外部请求 · 系统字体 · 浅/深色跟随系统(可手动覆盖)
   基础设施(token/卡片/文件展开/主题/连接)与圆桌观察台同源
   ============================================================ */

/* ---- 设计 token:浅色为基线 ---- */
:root{
  --bg:        #eef1f5;
  --canvas:    #f6f8fb;
  --surface:   #ffffff;
  --surface-2: #f1f4f8;
  --ink:       #16202c;
  --ink-soft:  #4a5765;
  --faint:     #7d8b9b;
  --line:      #e2e8f0;
  --line-2:    #cdd6e2;

  --accent:    #3061d6;   /* 一般强调 / 链接 */
  --c-ctrl:    #5457d6;   /* 主控(合同/编排) */
  --c-gen:     #2f7fd0;   /* 生成者 */
  --c-pass:    #0f875b;   /* 验收通过 / 交付 */
  --c-fail:    #c23d3d;   /* 验收不过 */
  --c-warn:    #c2610c;   /* 审计/增补/needs-fixes */
  --c-pause:   #b0730a;   /* 等待人类 */

  --shadow: 0 1px 2px rgba(16,32,48,.05), 0 6px 18px -12px rgba(16,32,48,.22);
  --shadow-lift: 0 2px 6px rgba(16,32,48,.07), 0 14px 34px -18px rgba(16,32,48,.30);
  --radius: 12px;
  --maxw: 960px;

  --mono: ui-monospace, "Cascadia Code", "SFMono-Regular", "JetBrains Mono", Consolas, "Liberation Mono", monospace;
  --sans: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
}

/* ---- 深色:手动覆盖优先,否则跟随系统 ---- */
:root[data-theme="dark"]{
  --bg:        #0b0f15;
  --canvas:    #0e131b;
  --surface:   #141b24;
  --surface-2: #1a222e;
  --ink:       #e7eef6;
  --ink-soft:  #a4b2c2;
  --faint:     #6d7d8f;
  --line:      #232d3a;
  --line-2:    #313d4d;

  --accent:    #6e97f7;
  --c-ctrl:    #8f92f2;
  --c-gen:     #63aef2;
  --c-pass:    #42cf95;
  --c-fail:    #ef6a6a;
  --c-warn:    #f0953f;
  --c-pause:   #f2c14e;

  --shadow: 0 1px 2px rgba(0,0,0,.4), 0 8px 22px -14px rgba(0,0,0,.7);
  --shadow-lift: 0 2px 6px rgba(0,0,0,.5), 0 18px 40px -20px rgba(0,0,0,.8);
}
@media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]):not([data-theme="dark"]){
    --bg:#0b0f15; --canvas:#0e131b; --surface:#141b24; --surface-2:#1a222e;
    --ink:#e7eef6; --ink-soft:#a4b2c2; --faint:#6d7d8f; --line:#232d3a; --line-2:#313d4d;
    --accent:#6e97f7; --c-ctrl:#8f92f2; --c-gen:#63aef2; --c-pass:#42cf95; --c-fail:#ef6a6a;
    --c-warn:#f0953f; --c-pause:#f2c14e;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 22px -14px rgba(0,0,0,.7);
    --shadow-lift:0 2px 6px rgba(0,0,0,.5),0 18px 40px -20px rgba(0,0,0,.8);
  }
}

/* ---- 基础 ---- */
*{box-sizing:border-box}
html,body{margin:0}
body{
  background:
    radial-gradient(1200px 480px at 50% -160px, color-mix(in oklab, var(--accent) 8%, var(--bg)), transparent 70%),
    var(--bg);
  color:var(--ink);
  font:14.5px/1.6 var(--sans);
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
a{color:var(--accent)}
::selection{background:color-mix(in oklab, var(--accent) 26%, transparent)}

/* ---- 顶部页头(含等待横幅,整体 sticky) ---- */
.topbar{
  position:sticky; top:0; z-index:20;
  background:color-mix(in oklab, var(--surface) 86%, transparent);
  backdrop-filter:saturate(1.4) blur(10px);
  border-bottom:1px solid var(--line);
}
.topbar-inner{ max-width:var(--maxw); margin:0 auto; padding:13px 22px 14px; }

.brandrow{ display:flex; align-items:center; gap:10px; }
.brand{ display:flex; align-items:center; gap:9px; font-weight:650; letter-spacing:.01em; font-size:15px; }
.brand .glyph{
  width:26px;height:26px;border-radius:8px;flex:0 0 auto;
  display:grid;place-items:center;color:#fff;
  background:linear-gradient(150deg, var(--c-ctrl), var(--c-pass));
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.15);
}
.brand .glyph svg{width:15px;height:15px}
.spacer{flex:1 1 auto}

.conn{ display:inline-flex; align-items:center; gap:7px; font:12px/1 var(--mono); color:var(--faint);
  padding:5px 10px; border:1px solid var(--line); border-radius:999px; background:var(--surface); white-space:nowrap; }
.conn .led{ width:8px;height:8px;border-radius:50%; background:var(--faint); flex:0 0 auto; }
.conn[data-s="live"] .led{ background:var(--c-pass); box-shadow:0 0 0 3px color-mix(in oklab,var(--c-pass) 26%, transparent); }
.conn[data-s="reconnect"] .led{ background:var(--c-pause); animation:blink 1s steps(2) infinite; }
.conn[data-s="demo"] .led{ background:var(--accent); box-shadow:0 0 0 3px color-mix(in oklab,var(--accent) 26%, transparent); }
.conn .replay{ margin-left:2px; color:var(--accent); cursor:pointer; text-decoration:none; border-left:1px solid var(--line-2); padding-left:8px; }
.conn .replay:hover{ text-decoration:underline; }

.theme-toggle{
  font:12px/1 var(--sans); color:var(--ink-soft); cursor:pointer;
  display:inline-flex; align-items:center; gap:6px;
  padding:6px 10px; border:1px solid var(--line); border-radius:999px; background:var(--surface);
}
.theme-toggle:hover{ border-color:var(--line-2); color:var(--ink); }
.theme-toggle svg{width:14px;height:14px}

.task{
  margin:11px 0 0; font-size:17px; line-height:1.45; font-weight:600; color:var(--ink);
  max-width:64ch; text-wrap:pretty;
}
.t-label{ font:11px/1 var(--mono); letter-spacing:.12em; text-transform:uppercase; color:var(--faint); display:block; margin-bottom:5px; }

/* 验收权威说明:观察者一眼看懂这个循环的裁判是谁 */
.auth-note{ margin-top:10px; display:flex; align-items:center; gap:8px; font:11.5px/1.5 var(--mono); color:var(--faint); }
.auth-note svg{ width:14px; height:14px; flex:0 0 auto; opacity:.85; }
.auth-note code{ font-family:var(--mono); background:var(--surface-2); border:1px solid var(--line);
  border-radius:4px; padding:1px 5px; color:var(--ink-soft); }

.metarow{ display:flex; flex-wrap:wrap; align-items:center; gap:8px 10px; margin-top:11px; }
.modes{ display:flex; flex-wrap:wrap; gap:7px; min-width:0; }
.mode-chip{
  display:inline-flex; align-items:center; gap:6px; min-width:0;
  padding:4px 10px; border:1px solid var(--line); border-radius:999px; background:var(--surface); font-size:12px;
  color:var(--ink-soft);
}
.mode-chip b{ color:var(--ink); font-weight:650; }

.runstatus{ margin-left:auto; display:inline-flex; align-items:center; gap:8px; flex-wrap:wrap; }
.pill{ display:inline-flex; align-items:center; gap:6px; font:12px/1 var(--sans); font-weight:600;
  padding:5px 11px; border-radius:999px; border:1px solid var(--line); background:var(--surface-2); color:var(--ink-soft); }
.pill .dotp{ width:7px;height:7px;border-radius:50%; background:var(--faint); }
.pill.running{ color:var(--accent); border-color:color-mix(in oklab,var(--accent) 40%,var(--line)); background:color-mix(in oklab,var(--accent) 10%, var(--surface)); }
.pill.running .dotp{ background:var(--accent); animation:pulse 1.8s ease-in-out infinite; }
.pill.ended{ color:var(--c-pass); border-color:color-mix(in oklab,var(--c-pass) 40%,var(--line)); background:color-mix(in oklab,var(--c-pass) 10%, var(--surface)); }
.pill.ended .dotp{ background:var(--c-pass); }
.pill.halted{ color:var(--c-fail); border-color:color-mix(in oklab,var(--c-fail) 40%,var(--line)); background:color-mix(in oklab,var(--c-fail) 10%, var(--surface)); }
.pill.halted .dotp{ background:var(--c-fail); }
.gprog{ font:11.5px/1 var(--mono); color:var(--faint); }

/* 仅供屏幕阅读器 */
.sr-only{ position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }

/* ---- 等待人类横幅 ---- */
.human-banner{
  max-width:var(--maxw); margin:0 auto;
  display:flex; align-items:flex-start; gap:11px;
  padding:11px 22px; margin-bottom:2px;
  color:color-mix(in oklab, var(--c-pause) 82%, var(--ink));
  background:color-mix(in oklab, var(--c-pause) 16%, var(--surface));
  border:1px solid color-mix(in oklab, var(--c-pause) 45%, var(--line));
  border-radius:10px;
}
.human-banner[hidden]{ display:none; }
.human-banner .hb-ic{ flex:0 0 auto; margin-top:1px; display:grid; place-items:center;
  width:22px;height:22px;border-radius:50%; color:#fff; background:var(--c-pause);
  animation:pulse 1.6s ease-in-out infinite; }
.human-banner .hb-ic svg{width:13px;height:13px}
.human-banner .hb-body{ min-width:0; }
.human-banner .hb-k{ font:11px/1 var(--mono); letter-spacing:.1em; text-transform:uppercase; opacity:.85; }
.human-banner .hb-q{ font-weight:650; margin-top:3px; text-wrap:pretty; }
.human-banner .hb-opts{ margin-top:6px; display:flex; flex-wrap:wrap; gap:6px; }
.human-banner .hb-opt{ font:11.5px/1 var(--sans); padding:3px 9px; border-radius:999px;
  border:1px solid color-mix(in oklab,var(--c-pause) 40%, var(--line)); background:var(--surface); }

/* ---- 主区 ---- */
main{ max-width:var(--maxw); margin:0 auto; padding:20px 22px 120px; }

.empty{
  margin:64px auto; max-width:440px; text-align:center; color:var(--faint);
}
.empty .e-ic{ width:44px;height:44px;margin:0 auto 14px; color:var(--faint);
  border:1.5px dashed var(--line-2); border-radius:14px; display:grid; place-items:center; }
.empty .e-ic svg{ width:22px;height:22px; opacity:.7; }
.empty h2{ margin:0 0 6px; font-size:15px; font-weight:600; color:var(--ink-soft); }
.empty p{ margin:0; font-size:13px; }
.empty .dots span{ animation:blink 1.4s infinite; }
.empty .dots span:nth-child(2){ animation-delay:.2s } .empty .dots span:nth-child(3){ animation-delay:.4s }

/* 分段(需求→合同 / 每个 goal / 收官)+ 时间线脊 */
.seg{ position:relative; margin:22px 0 4px; }
.seg-head{ display:flex; align-items:center; flex-wrap:wrap; gap:9px 10px; padding-bottom:2px; }
.seg-no{ font:600 12px/1 var(--mono); letter-spacing:.06em; color:#fff;
  background:var(--gc, var(--faint)); padding:5px 9px; border-radius:7px;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.16); }
.seg-no.plain{ color:var(--ink); background:var(--surface-2); border:1px solid var(--line); box-shadow:none; }
.seg-title{ font-size:13px; color:var(--ink); font-weight:650; }
.goal-status{ font:11.5px/1 var(--sans); font-weight:600; padding:4px 9px; border-radius:999px;
  border:1px solid var(--line); background:var(--surface-2); color:var(--ink-soft); }
.goal-status.running{ color:var(--accent); border-color:color-mix(in oklab,var(--accent) 40%,var(--line)); background:color-mix(in oklab,var(--accent) 9%,var(--surface)); }
.goal-status.passed{ color:var(--c-pass); border-color:color-mix(in oklab,var(--c-pass) 40%,var(--line)); background:color-mix(in oklab,var(--c-pass) 10%,var(--surface)); }
.goal-status.stuck{ color:var(--c-fail); border-color:color-mix(in oklab,var(--c-fail) 40%,var(--line)); background:color-mix(in oklab,var(--c-fail) 10%,var(--surface)); }

/* AC 爬坡条:每迭代一根,高度 = 通过占比;红=该轮 FAIL,绿=PASS */
.climb{ display:inline-flex; align-items:center; gap:8px; margin-left:auto; }
.climb-label{ font:10.5px/1 var(--mono); letter-spacing:.08em; text-transform:uppercase; color:var(--faint); }
.climb-bars{ display:inline-flex; align-items:flex-end; gap:3px; height:22px; }
.climb-bars i{ display:inline-block; width:9px; min-height:3px; border-radius:2px 2px 0 0;
  background:var(--c-fail); opacity:.85; }
.climb-bars i.pass{ background:var(--c-pass); }
.climb-text{ font:11px/1 var(--mono); color:var(--ink-soft); white-space:nowrap; }

.seg-body{ position:relative; margin-top:11px; padding-left:26px; }
.seg-body::before{ content:""; position:absolute; left:8px; top:6px; bottom:6px; width:2px;
  background:linear-gradient(var(--line-2), transparent); border-radius:2px; }

/* 卡片通用 */
.card{
  position:relative; background:var(--surface); border:1px solid var(--line);
  border-radius:var(--radius); padding:13px 15px; margin:11px 0; box-shadow:var(--shadow);
}
.card::before{ /* 时间线节点 */
  content:""; position:absolute; left:-22px; top:19px; width:9px;height:9px; border-radius:50%;
  background:var(--surface); border:2px solid var(--line-2);
}
.card.enter{ animation:cardIn .3s cubic-bezier(.2,.7,.3,1) both; }

.c-head{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; min-width:0; }
.who{ font-weight:650; min-width:0; }
.tag{ font:11.5px/1 var(--mono); color:var(--ink-soft); background:var(--surface-2);
  border:1px solid var(--line); border-radius:6px; padding:3px 7px; white-space:nowrap; }
.tag.gen{ color:color-mix(in oklab,var(--c-gen) 75%,var(--ink)); border-color:color-mix(in oklab,var(--c-gen) 35%,var(--line)); background:color-mix(in oklab,var(--c-gen) 9%,var(--surface)); }
.c-meta{ margin-left:auto; display:inline-flex; align-items:center; gap:9px; flex-wrap:wrap;
  font:11.5px/1 var(--mono); color:var(--faint); }
.c-body{ margin-top:8px; color:var(--ink); line-height:1.68; text-wrap:pretty; overflow-wrap:anywhere; max-width:72ch; }
.body-src{ font:10.5px/1 var(--mono); letter-spacing:.06em; color:var(--faint); background:var(--surface-2);
  border:1px solid var(--line); border-radius:5px; padding:2px 6px; margin-right:8px; white-space:nowrap; }
.c-kv{ margin-top:8px; font-size:12.8px; color:var(--ink-soft); line-height:1.62; text-wrap:pretty; max-width:72ch; }
.c-kv .k{ font:10.5px/1 var(--mono); letter-spacing:.08em; text-transform:uppercase; color:var(--faint);
  display:inline-block; margin-right:6px; }
.commit-chip{ font:11px/1 var(--mono); color:var(--ink-soft); background:var(--surface-2);
  border:1px solid var(--line); border-radius:5px; padding:2px 6px; white-space:nowrap; }

/* 生成者交付卡 */
.card.gen{ border-left:3px solid var(--c-gen); }
.card.gen::before{ border-color:var(--c-gen); }

/* 访谈 / 面板 / 定稿:弱化 */
.card.lite{ background:var(--canvas); box-shadow:none; padding:10px 14px; }
.card.lite .who{ font-weight:600; }

/* === 高层级卡(strip 头) === */
.card.hi{ box-shadow:var(--shadow-lift); border-width:1px; }
.card.hi .strip{
  display:flex; align-items:center; gap:9px; flex-wrap:wrap;
  margin:-13px -15px 12px; padding:11px 15px; border-radius:var(--radius) var(--radius) 0 0;
  font-weight:650; letter-spacing:.01em;
}
.card.hi .strip .s-ic{ display:grid; place-items:center; width:22px;height:22px;border-radius:7px; color:#fff; flex:0 0 auto; }
.card.hi .strip .s-ic svg{ width:14px;height:14px; }
.card.hi .strip .s-sub{ font:12px/1 var(--sans); font-weight:600; opacity:.9; }
.card.hi .strip .s-right{ margin-left:auto; display:inline-flex; align-items:center; gap:6px; font-weight:500; }
.c-rationale{ margin-top:10px; font-size:14px; line-height:1.72; color:var(--ink); text-wrap:pretty; max-width:74ch; }

/* 合同(主控色) */
.card.contract{ border-left:4px solid var(--c-ctrl); }
.card.contract::before{ background:var(--c-ctrl); border-color:var(--c-ctrl); }
.card.contract .strip{ background:color-mix(in oklab,var(--c-ctrl) 12%, var(--surface));
  color:color-mix(in oklab,var(--c-ctrl) 78%, var(--ink)); border-bottom:1px solid color-mix(in oklab,var(--c-ctrl) 24%,var(--line)); }
.card.contract .strip .s-ic{ background:var(--c-ctrl); }
.goal-list{ margin-top:10px; display:grid; gap:7px; }
.goal-row{ display:flex; align-items:center; gap:9px; padding:8px 11px; background:var(--surface-2);
  border:1px solid var(--line); border-radius:9px; font-size:13px; }
.goal-row .seg-no{ font-size:11px; padding:4px 7px; }
.goal-row .g-ac{ margin-left:auto; font:11px/1 var(--mono); color:var(--faint); white-space:nowrap; }

/* 验收 verdict 卡 */
.card.verdict.pass{ border-left:4px solid var(--c-pass); }
.card.verdict.pass::before{ background:var(--c-pass); border-color:var(--c-pass); }
.card.verdict.pass .strip{ background:color-mix(in oklab,var(--c-pass) 12%, var(--surface));
  color:color-mix(in oklab,var(--c-pass) 70%, var(--ink)); border-bottom:1px solid color-mix(in oklab,var(--c-pass) 24%,var(--line)); }
.card.verdict.pass .strip .s-ic{ background:var(--c-pass); }
.card.verdict.fail{ border-left:4px solid var(--c-fail); }
.card.verdict.fail::before{ background:var(--c-fail); border-color:var(--c-fail); }
.card.verdict.fail .strip{ background:color-mix(in oklab,var(--c-fail) 11%, var(--surface));
  color:color-mix(in oklab,var(--c-fail) 74%, var(--ink)); border-bottom:1px solid color-mix(in oklab,var(--c-fail) 24%,var(--line)); }
.card.verdict.fail .strip .s-ic{ background:var(--c-fail); }
.acgrid{ margin-top:11px; display:grid; gap:6px; }
.ac-row{ display:grid; grid-template-columns:auto auto 1fr; gap:9px; align-items:baseline;
  padding:7px 11px; background:var(--surface-2); border:1px solid var(--line); border-radius:8px; }
.ac-id{ font:600 11.5px/1.3 var(--mono); color:var(--ink); white-space:nowrap; }
.ac-st{ font:600 11px/1 var(--mono); padding:3px 7px; border-radius:5px; white-space:nowrap; }
.ac-st.pass{ color:var(--c-pass); background:color-mix(in oklab,var(--c-pass) 10%,var(--surface)); border:1px solid color-mix(in oklab,var(--c-pass) 30%,var(--line)); }
.ac-st.fail{ color:var(--c-fail); background:color-mix(in oklab,var(--c-fail) 10%,var(--surface)); border:1px solid color-mix(in oklab,var(--c-fail) 30%,var(--line)); }
.ac-st.skipped{ color:var(--faint); background:var(--surface-2); border:1px solid var(--line); }
.ac-st.blocked{ color:var(--c-warn); background:color-mix(in oklab,var(--c-warn) 12%,var(--surface)); border:1px solid color-mix(in oklab,var(--c-warn) 32%,var(--line)); }
.ac-ev{ font-size:12.5px; color:var(--ink-soft); line-height:1.55; overflow-wrap:anywhere; }
.defects{ margin-top:11px; }
.defects h4{ margin:0 0 6px; font:11px/1 var(--mono); letter-spacing:.08em; text-transform:uppercase; color:var(--c-fail); }
.defects ul{ margin:0; padding-left:18px; }
.defects li{ margin:4px 0; font-size:12.8px; color:var(--ink-soft); line-height:1.6; text-wrap:pretty; }
.defects li b{ font:600 11px/1 var(--mono); color:var(--c-fail); }

/* 洁净树审计卡 */
.card.tainted{ border-left:4px solid var(--c-warn); background:color-mix(in oklab,var(--c-warn) 5%,var(--surface)); }
.card.tainted::before{ background:var(--c-warn); border-color:var(--c-warn); }

/* 尺子误判仲裁卡(主控裁决,区别于洁净树污染) */
.card.sdefect{ border-left:4px solid var(--c-ctrl); background:color-mix(in oklab,var(--c-ctrl) 5%,var(--surface)); }
.card.sdefect::before{ background:var(--c-ctrl); border-color:var(--c-ctrl); }

/* 合同增补卡 */
.card.amend{ border-left:3px solid var(--c-warn); }
.card.amend::before{ border-color:var(--c-warn); }

/* 等待拍板卡(human:asked) */
.card.ask{ border-left:4px solid var(--c-pause); }
.card.ask::before{ background:var(--c-pause); border-color:var(--c-pause); }
.card.ask .strip{ background:color-mix(in oklab,var(--c-pause) 15%, var(--surface));
  color:color-mix(in oklab,var(--c-pause) 78%, var(--ink)); border-bottom:1px solid color-mix(in oklab,var(--c-pause) 30%,var(--line)); }
.card.ask .strip .s-ic{ background:var(--c-pause); }
.ask-q{ margin-top:10px; font-size:15px; font-weight:600; line-height:1.55; text-wrap:pretty; max-width:70ch; }
.ask-opts{ margin-top:9px; display:flex; flex-wrap:wrap; gap:7px; }
.ask-opt{ font:12px/1 var(--sans); padding:5px 11px; border-radius:8px; background:var(--surface);
  border:1px solid var(--line-2); color:var(--ink-soft); }
.ask-state{ margin-top:11px; display:inline-flex; align-items:center; gap:7px; font-size:12.5px; font-weight:600;
  color:color-mix(in oklab,var(--c-pause) 80%,var(--ink)); }
.ask-state .dotp{ width:7px;height:7px;border-radius:50%;background:var(--c-pause); animation:pulse 1.6s ease-in-out infinite; }
.card.ask.resolved{ border-left-color:var(--c-pass); }
.card.ask.resolved::before{ background:var(--c-pass); border-color:var(--c-pass); }
.card.ask.resolved .ask-state{ color:var(--c-pass); }
.card.ask.resolved .ask-state .dotp{ background:var(--c-pass); animation:none; }

/* 访谈卡等待态 */
.intake-state{ margin-top:8px; display:inline-flex; align-items:center; gap:7px; font-size:12px; font-weight:600; color:var(--faint); }
.intake-state .dotp{ width:6px;height:6px;border-radius:50%;background:var(--faint); animation:pulse 1.6s ease-in-out infinite; }
.card.intake.resolved .intake-state{ color:var(--c-pass); }
.card.intake.resolved .intake-state .dotp{ background:var(--c-pass); animation:none; }

/* 收官评审卡 */
.card.review.approve{ border-left:4px solid var(--c-pass); }
.card.review.approve::before{ background:var(--c-pass); border-color:var(--c-pass); }
.card.review.approve .strip{ background:color-mix(in oklab,var(--c-pass) 12%,var(--surface));
  color:color-mix(in oklab,var(--c-pass) 70%,var(--ink)); border-bottom:1px solid color-mix(in oklab,var(--c-pass) 24%,var(--line)); }
.card.review.approve .strip .s-ic{ background:var(--c-pass); }
.card.review.needsfixes{ border-left:4px solid var(--c-warn); }
.card.review.needsfixes::before{ background:var(--c-warn); border-color:var(--c-warn); }
.card.review.needsfixes .strip{ background:color-mix(in oklab,var(--c-warn) 12%,var(--surface));
  color:color-mix(in oklab,var(--c-warn) 76%,var(--ink)); border-bottom:1px solid color-mix(in oklab,var(--c-warn) 24%,var(--line)); }
.card.review.needsfixes .strip .s-ic{ background:var(--c-warn); }

/* 文件按钮 + 展开区 */
.filebtn{ display:inline-flex; align-items:center; gap:5px; font:12px/1 var(--sans); color:var(--accent);
  background:none; border:1px solid var(--line-2); border-radius:7px; padding:5px 9px; cursor:pointer; }
.filebtn:hover{ background:color-mix(in oklab,var(--accent) 8%,var(--surface)); border-color:color-mix(in oklab,var(--accent) 35%,var(--line-2)); }
.filebtn svg{ width:13px;height:13px; }
.file-slot{ margin-top:11px; border-top:1px dashed var(--line-2); padding-top:11px; animation:cardIn .24s ease both; }
.file-loading, .file-error{ font:12.5px/1.5 var(--mono); color:var(--faint); }
.file-error{ color:var(--c-fail); }
/* 原文出处小注:一眼确认是委托 agent 原话、未经主控转写 */
.prov-note{ font:11px/1.5 var(--mono); color:var(--faint); margin-bottom:9px;
  padding-left:9px; border-left:2px solid var(--line-2); }

/* 内联 Markdown 渲染 */
.md-body{ color:var(--ink); line-height:1.72; font-size:14px; overflow-wrap:anywhere; }
.md-body h3,.md-body h4,.md-body h5{ margin:14px 0 6px; line-height:1.4; }
.md-body h3{ font-size:15px; } .md-body h4{ font-size:13.5px; color:var(--ink-soft); }
.md-body h3:first-child,.md-body h4:first-child{ margin-top:0; }
.md-body p{ margin:7px 0; text-wrap:pretty; max-width:72ch; }
.md-body ul,.md-body ol{ margin:7px 0; padding-left:22px; }
.md-body li{ margin:3px 0; text-wrap:pretty; }
.md-body strong{ font-weight:650; color:var(--ink); }
.md-body code{ font:12.5px/1 var(--mono); background:var(--surface-2); border:1px solid var(--line);
  border-radius:5px; padding:1px 5px; }
.md-body hr{ border:none; border-top:1px solid var(--line); margin:12px 0; }

/* === 收官面板 === */
.final{
  position:relative; margin:26px 0 6px; padding:0; overflow:hidden;
  background:var(--surface); border:1px solid color-mix(in oklab,var(--c-pass) 34%,var(--line));
  border-radius:16px; box-shadow:var(--shadow-lift);
}
.final::after{ content:""; position:absolute; inset:0 auto 0 0; width:5px; background:var(--c-pass); }
.final.enter{ animation:cardIn .38s cubic-bezier(.2,.7,.3,1) both; }
.final-head{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; padding:14px 18px;
  background:color-mix(in oklab,var(--c-pass) 12%, var(--surface));
  border-bottom:1px solid color-mix(in oklab,var(--c-pass) 22%,var(--line)); }
.final-head .f-ic{ width:26px;height:26px;border-radius:8px;display:grid;place-items:center;color:#fff;background:var(--c-pass);flex:0 0 auto; }
.final-head .f-ic svg{ width:16px;height:16px; }
.final-head h2{ margin:0; font-size:16px; color:color-mix(in oklab,var(--c-pass) 62%,var(--ink)); }
.final-head .filebtn{ margin-left:auto; }
.final-pad{ padding:16px 18px 18px; }
.final-line{ font-size:15.5px; font-weight:600; line-height:1.6; color:var(--ink); text-wrap:pretty; max-width:74ch; }
.final-line .k{ display:block; font:11px/1 var(--mono); letter-spacing:.1em; text-transform:uppercase; color:var(--c-pass); margin-bottom:6px; }
.final-branch{ margin-top:10px; }
.final .file-slot{ margin:0 18px 18px; }

/* 「↓ 有新进展」浮标 */
.jump{ position:fixed; left:50%; bottom:22px; transform:translateX(-50%);
  display:inline-flex; align-items:center; gap:7px; font:12.5px/1 var(--sans); font-weight:600; color:#fff;
  background:var(--accent); border:none; border-radius:999px; padding:9px 15px; cursor:pointer;
  box-shadow:0 8px 24px -8px color-mix(in oklab,var(--accent) 70%,transparent); z-index:15; }
.jump[hidden]{ display:none; }
.jump:hover{ filter:brightness(1.06); }
.jump svg{ width:13px;height:13px; }

/* icon 基类 */
.ic{ width:15px;height:15px; vertical-align:-2px; }

/* 动画 */
@keyframes cardIn{ from{opacity:0; transform:translateY(7px);} to{opacity:1; transform:none;} }
@keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.35;} }
@keyframes blink{ 0%,100%{opacity:1;} 50%{opacity:.25;} }
@media (prefers-reduced-motion: reduce){ *{ animation:none !important; scroll-behavior:auto !important; } }

/* 响应式:窄窗口 */
@media (max-width:640px){
  .topbar-inner{ padding:11px 15px; }
  main{ padding:16px 15px 120px; }
  .task{ font-size:15.5px; }
  .runstatus{ margin-left:0; width:100%; }
  .seg-body{ padding-left:20px; }
  .card::before{ left:-17px; }
  .c-meta{ width:100%; margin-left:0; }
  .climb{ margin-left:0; width:100%; }
  .ac-row{ grid-template-columns:auto auto; }
  .ac-ev{ grid-column:1 / -1; }
}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div id="human-banner" class="human-banner" role="alert" aria-live="assertive" hidden></div>

    <div class="brandrow">
      <span class="brand">
        <span class="glyph" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12a8 8 0 0 1 13.6-5.7L20 8.5"/><path d="M20 4v4.5h-4.5"/><path d="M20 12a8 8 0 0 1-13.6 5.7L4 15.5"/><path d="M4 20v-4.5h4.5"/></svg></span>
        Loop 交付 · 观察台
      </span>
      <span class="spacer"></span>
      <span class="conn" id="conn" data-s="connecting" aria-live="polite"><span class="led"></span><span id="connText">连接中…</span></span>
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="切换配色主题">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v2M12 19v2M5 12H3M21 12h-2M6 6l-1.5-1.5M19.5 19.5 18 18M18 6l1.5-1.5M4.5 19.5 6 18"/><circle cx="12" cy="12" r="4"/></svg>
        <span id="themeLabel">自动</span>
      </button>
    </div>

    <div class="task" id="task"><span class="t-label">任务</span><span id="taskText">等待 loop 开始…</span></div>

    <div class="metarow">
      <div class="modes" id="modes" aria-label="运行模式"></div>
      <div class="runstatus" id="runstatus">
        <span class="pill" id="statusPill"><span class="dotp"></span><span id="statusText">未开始</span></span>
        <span class="gprog" id="gprog"></span>
      </div>
    </div>

    <div class="auth-note" aria-label="验收权威说明">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3l7 4v5c0 4.4-3 8.2-7 9-4-.8-7-4.6-7-9V7z"/><path d="M9 12l2 2 4-4.5"/></svg>
      <span>验收权威 = 独立验证者(引擎≠生成者,逐条 <code>AC</code> 亲手执行);生成者自述不作数,主控只记账不验收</span>
    </div>
  </div>
</header>

<main id="main">
  <div class="empty" id="empty">
    <div class="e-ic" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12a8 8 0 0 1 13.6-5.7L20 8.5"/><path d="M20 4v4.5h-4.5"/><path d="M20 12a8 8 0 0 1-13.6 5.7L4 15.5"/><path d="M4 20v-4.5h4.5"/></svg></div>
    <h2>等待 loop 开始</h2>
    <p>连接就绪后,这里会实时放出访谈、合同、每轮生成与验收、爬坡与终稿<span class="dots"><span>·</span><span>·</span><span>·</span></span></p>
  </div>
  <div id="timeline" role="log" aria-live="polite" aria-label="交付时间线"></div>
  <div id="finalSlot"></div>
</main>

<button class="jump" id="jump" type="button" hidden>
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M6 13l6 6 6-6"/></svg>
  有新进展 <span id="jumpN"></span>
</button>

<script>
"use strict";
/* ============================================================
   数据契约(与服务器一致,勿改字段名):
     GET /events  — SSE:先回放已发生的全部事件,再实时推送
                    · 默认 message 事件,e.data 是一行 JSON
                    · 具名 reset 事件 → 清空整个视图
                    · 按 seq 去重(断线重连会全量重放)
     GET /file?ref=<相对路径>  — 按需取旁挂大文本(text/plain)
   —— 若探测不到服务器(纯原型/独立打开),自动回放内联样例,
      走同一套 handle()/去重/渲染 管线;服务器一在即用真实数据。
   事件 schema 见 EVENTS.md(agent-bridge-loop)。
   ============================================================ */

/* ---------- goal 固定色(浅深色下均可辨;不只靠颜色,另有 G 编号) ---------- */
var GOAL_PALETTE = ["#0f9d8f","#7c5cff","#e24a7a","#2f9be0","#c98a17","#5b8def"];
var STUCK_LABEL = { "halt":"无人值守中止", "user-extend":"用户:加轮", "user-amend":"用户:改合同", "user-abandon":"用户:放弃" };
var STUCK_REASON = { "iter-cap":"达迭代上限", "script-defect-loop":"尺子仲裁反复不收敛" };
var DISCOVER_LABEL = { "generator":"生成者", "controller":"主控", "validator":"验证者", "reviewer":"评审" };
var TERM_LABEL = { done:"交付完成", stuck:"卡死中止", user:"用户终止", error:"异常终止" };

var goals = {};            // goalId -> {sec, body, statusEl, climbEl, climb:[], color, title}
var segs = {};             // 分段 key(@intake/@closing/goalId) -> {sec, body}
var currentKey = "@intake"; // 无显式 goal 的事件按时间挂到当前分段
var goalsTotal = null, goalsPassed = 0;
var pendingHuman = {};     // questionId -> question
var askedCards = {};       // questionId -> card element
var intakeQueue = [];      // 未答的访谈卡(FIFO)
var seen = new Set();      // 已见 seq → 去重

var elTimeline = document.getElementById("timeline");
var elFinal    = document.getElementById("finalSlot");
var elEmpty    = document.getElementById("empty");
var elBanner   = document.getElementById("human-banner");

/* ---------- 工具 ---------- */
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); }

var ICONS = {
  contract:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7v18h10V7z"/><path d="M14 3v4h3M9.5 12h5M9.5 15.5h5M9.5 8.5H11"/></svg>',
  flask:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3v6L4.8 18a2 2 0 0 0 1.7 3h11a2 2 0 0 0 1.7-3L14 9V3"/><path d="M8.5 3h7M7.5 14h9"/></svg>',
  hammer:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4.5 19 9l-2.2 2.2-4.5-4.5z"/><path d="M12.3 6.7 4 15l3 3 8.3-8.3"/></svg>',
  pause:'<svg class="ic" viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="6.5" y="5" width="3.6" height="14" rx="1.2"/><rect x="13.9" y="5" width="3.6" height="14" rx="1.2"/></svg>',
  check:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>',
  cross:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>',
  shield:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 4v5c0 4.4-3 8.2-7 9-4-.8-7-4.6-7-9V7z"/><path d="M9 12l2 2 4-4.5"/></svg>',
  warn:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4 2.8 20h18.4z"/><path d="M12 10v4M12 17.2v.3"/></svg>',
  doc:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7v18h10V7z"/><path d="M14 3v4h3M9.5 12h5M9.5 15.5h5"/></svg>',
  chat:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a8 8 0 0 1-8 8H4l2.2-2.6A8 8 0 1 1 21 12z"/><path d="M8.5 10.5h7M8.5 13.5h4.5"/></svg>'
};

function fileBtn(ref, label){
  if(!ref) return "";
  return '<button class="filebtn" type="button" data-ref="'+esc(ref)+'" aria-expanded="false">'+ICONS.doc+esc(label||"查看全文")+'</button>';
}

/* ---------- 分段(需求→合同 / goal / 收官) ---------- */
function segMeta(key){
  if(key === "@intake")  return { no:"起点", plain:true,  title:"需求 → 合同" };
  if(key === "@closing") return { no:"收官", plain:true,  title:"整支评审 → 交付" };
  var g = goals[key] || {};
  return { no:key, plain:false, title:g.title || "", color:g.color };
}
function segFor(key){
  if(segs[key]) return segs[key];
  var m = segMeta(key);
  var sec = document.createElement("section"); sec.className="seg"; sec.dataset.k = key;
  var head = document.createElement("div"); head.className="seg-head";
  head.innerHTML = '<span class="seg-no'+(m.plain?' plain':'')+'"'+(m.color?' style="--gc:'+m.color+'"':'')+'>'+esc(m.no)+'</span>'
    + '<span class="seg-title">'+esc(m.title)+'</span>'
    + (m.plain ? '' : '<span class="goal-status running">进行中</span><span class="climb" hidden><span class="climb-label">AC 爬坡</span><span class="climb-bars"></span><span class="climb-text"></span></span>');
  var body = document.createElement("div"); body.className="seg-body";
  sec.appendChild(head); sec.appendChild(body);
  elTimeline.appendChild(sec);   // 事件按时间到达,分段按创建序排列
  segs[key] = { sec:sec, head:head, body:body,
    statusEl: head.querySelector(".goal-status"),
    climbEl:  head.querySelector(".climb") };
  return segs[key];
}
function addCard(key, cls, html){
  hideEmpty();
  var c = document.createElement("div");
  c.className = "card enter" + (cls?(" "+cls):"");
  c.innerHTML = html;
  c.addEventListener("animationend", function(){ c.classList.remove("enter"); }, {once:true});
  segFor(key).body.appendChild(c);
  maybeFollow();
  return c;
}
function hideEmpty(){ if(elEmpty && !elEmpty.hidden){ elEmpty.hidden = true; } }

/* ---------- 爬坡 ---------- */
function renderClimb(goalId){
  var g = goals[goalId]; if(!g) return;
  var seg = segs[goalId]; if(!seg || !seg.climbEl) return;
  if(!g.climb.length){ seg.climbEl.hidden = true; return; }
  seg.climbEl.hidden = false;
  var bars = seg.climbEl.querySelector(".climb-bars");
  var text = seg.climbEl.querySelector(".climb-text");
  bars.innerHTML = g.climb.map(function(it){
    var pct = it.total ? Math.max(14, Math.round(it.passed/it.total*100)) : 14;
    return '<i class="'+(it.verdict==="pass"?"pass":"")+'" style="height:'+pct+'%" title="i'+it.n+": "+it.passed+"/"+it.total+'"></i>';
  }).join("");
  text.textContent = g.climb.map(function(it){ return it.passed+"/"+it.total; }).join(" → ");
}
function setGoalStatus(goalId, cls, label){
  var seg = segs[goalId]; if(!seg || !seg.statusEl) return;
  seg.statusEl.className = "goal-status "+cls;
  seg.statusEl.textContent = label;
}
function setGprog(){
  var el = document.getElementById("gprog");
  if(goalsTotal!=null) el.textContent = "goals "+goalsPassed+"/"+goalsTotal+(goalsPassed===goalsTotal?" ✅":"");
}

/* ---------- 事件分发 ---------- */
function handle(ev){
  if(!ev || typeof ev !== "object") return;
  if(ev.seq != null){ if(seen.has(ev.seq)) return; seen.add(ev.seq); }  // 断线重连去重
  var p = ev.payload || {};
  switch(ev.event){

    case "run:started": {
      hideEmpty();
      setText("taskText", p.task || "(未命名任务)");
      var m = p.mode || {};
      var box = document.getElementById("modes"); box.innerHTML = "";
      var chips = [
        (m.human===false) ? "模式 <b>无人值守</b>" : "模式 <b>人在环</b>",
        "评审团 <b>"+esc(m.panel==="architects"?"双架构师":(m.panel==="roundtable"?"圆桌":"无"))+"</b>",
        "工作区 <b>"+esc(m.workspace==="worktree"?"worktree+branch":"主树")+"</b>"
      ];
      if(p.iterCap!=null) chips.push("迭代上限 <b>"+esc(p.iterCap)+"</b>/goal");
      if(p.branch) chips.push("branch <b>"+esc(p.branch)+"</b>");
      chips.forEach(function(h){ var s=document.createElement("span"); s.className="mode-chip"; s.innerHTML=h; box.appendChild(s); });
      setStatus("进行中", "running");
      break;
    }

    case "intake:asked": {
      var card = addCard(currentKey, "lite intake",
        '<div class="c-head"><span class="tag">'+ICONS.chat+' 需求访谈</span></div>'
        + '<div class="c-body">'+esc(p.question||"")+'</div>'
        + '<div class="intake-state"><span class="dotp"></span>等待回答…</div>');
      intakeQueue.push(card);
      break;
    }
    case "intake:answered": {
      var ic = intakeQueue.shift();
      if(ic){
        ic.classList.add("resolved");
        var st = ic.querySelector(".intake-state");
        if(st) st.innerHTML = '<span class="dotp"></span>已答 · '+esc(p.answer||"");
        maybeFollow();
      } else {
        addCard(currentKey, "lite", '<div class="c-head"><span class="tag">'+ICONS.check+' 访谈已答</span><span class="who" style="font-weight:600">'+esc(p.answer||"")+'</span></div>');
      }
      break;
    }

    case "panel:launched":
      addCard(currentKey, "lite",
        '<div class="c-head"><span class="tag">评审团拉起</span>'
        + '<span class="who">'+esc(p.kind==="roundtable"?"圆桌":"双架构师")+'</span>'
        + (p.runDir ? '<span class="c-meta">'+esc(p.runDir)+'</span>' : '')+'</div>');
      break;
    case "panel:concluded":

async function fetchFile(ref){
  if(DEMO){
    if(Object.prototype.hasOwnProperty.call(DEMO_FILES, ref)) return DEMO_FILES[ref];
    throw new Error("样例中无此文件");
  }
  var res = await fetch("/file?ref=" + encodeURIComponent(ref));

/* ---------- 极小型 · 安全 Markdown(先转义,再套受控标签,零外链) ---------- */
function mdToHtml(src){
  var inline = function(s){
    return esc(s)
      .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
      .replace(/`([^`]+)`/g, "<code>$1</code>");
  };
  var lines = String(src).replace(/\r\n?/g, "\n").split("\n");
  var out = "", ul = false, ol = false;
  var closeLists = function(){ if(ul){ out+="</ul>"; ul=false; } if(ol){ out+="</ol>"; ol=false; } };
  for(var i=0;i<lines.length;i++){
    var line = lines[i].replace(/\s+$/,"");
    if(!line.trim()){ closeLists(); continue; }
    var m;
    if(/^#{1,6}\s+/.test(line)){ closeLists(); var lvl=line.match(/^#+/)[0].length; var h=Math.min(lvl+2,6);
      out += "<h"+h+">"+inline(line.replace(/^#+\s+/,""))+"</h"+h+">"; continue; }
    if(/^\s*(---+|\*\*\*+)\s*$/.test(line)){ closeLists(); out += "<hr>"; continue; }
    if((m = line.match(/^\s*[-*]\s+(.*)$/))){ if(!ul){ closeLists(); out+="<ul>"; ul=true; } out += "<li>"+inline(m[1])+"</li>"; continue; }
    if((m = line.match(/^\s*\d+[.)]\s+(.*)$/))){ if(!ol){ closeLists(); out+="<ol>"; ol=true; } out += "<li>"+inline(m[1])+"</li>"; continue; }
    closeLists(); out += "<p>"+inline(line)+"</p>";
  }
  closeLists();
  return out;
}

/* ---------- 自动跟随 + 「↓ 有新进展」 ---------- */
var stick = true, pending = 0;
var elJump = document.getElementById("jump");
function nearBottom(){ return (window.innerHeight + window.scrollY) >= (document.documentElement.scrollHeight - 140); }
function scrollBottom(){ window.scrollTo({ top: document.documentElement.scrollHeight, behavior: "auto" }); }
function maybeFollow(){
  if(stick){ requestAnimationFrame(scrollBottom); }
  else { pending++; elJump.hidden = false; setText("jumpN", pending>99 ? "99+" : String(pending)); }
}
window.addEventListener("scroll", function(){
  if(nearBottom()){ stick = true; pending = 0; elJump.hidden = true; }
  else { stick = false; }
}, {passive:true});
elJump.addEventListener("click", function(){ stick = true; pending = 0; elJump.hidden = true; scrollBottom(); });

/* ============================================================
   连接:真实 SSE 优先。
   —— DEMO(内联样例回放)只在**确定没有真实服务器**时启用:
      ① file:// 离线打开(根本连不到 /events),或 ② 显式 ?demo=1(哑静态服务器上预览)。
   由真实 serve.mjs(http)吐出的页面**永不自动进 DEMO**:即使 /events 因机器负载/杀软/
   代理/连接排队而慢几秒,也只显示"连接中/重连中",绝不关掉真实连接切假样例——否则会拿
   离线样例冒充真实运行(最坏的数据污染)。慢连接靠 EventSource 自身重连兜底,宁可等真数据。
   ============================================================ */
var OFFLINE = (location.protocol === "file:") || /[?&]demo=1(?:&|$)/.test(location.search);
var DEMO = false, everOpen = false, everMsg = false, demoStarted = false, es = null;

function connect(){
  if(OFFLINE){ startDemo(false); return; }            // 确定无服务器 → 回放内联样例
  try{ es = new EventSource("/events"); }
  catch(e){ setConn("reconnect"); return; }            // 环境无 EventSource:保持重连态,不伪造数据
  es.onopen = function(){ everOpen = true; setConn("live"); };
  es.onmessage = function(e){ everMsg = true; var ev; try{ ev = JSON.parse(e.data); }catch(_){ return; } try{ handle(ev); }catch(_){} };
  es.addEventListener("reset", function(){ try{ resetView(); }catch(_){} });
  // 断线/未连:交给 EventSource 自动重连,只更新指示灯,永不进 DEMO
  es.onerror = function(){ setConn(everOpen || everMsg ? "reconnect" : "connecting"); };
}

function startDemo(force){
  if(demoStarted && !force) return;
  demoStarted = true; DEMO = true;
  if(es){ try{ es.close(); }catch(_){} }
  setConn("demo");
  resetView();
  // 逐条回放,模拟"实时追加"节奏
  var i = 0;
  (function step(){
    if(i >= DEMO_EVENTS.length) return;
    try{ handle(DEMO_EVENTS[i]); }catch(_){}
    i++;
    var gap = (i<=1) ? 260 : (i>=DEMO_EVENTS.length ? 0 : 520 + (i%3)*140);
    if(i < DEMO_EVENTS.length) setTimeout(step, gap);
  })();
}
